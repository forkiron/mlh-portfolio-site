<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="{{ name }}">
    <meta property="og:description" content="first year @ uwaterloo · into consumer tech">
    <meta property="og:url" content="{{ url }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon" />
    <title>{{ title }}</title>
    {% block head %}{% endblock %}
</head>

<body>
    <header class="nav-bar">
        <div class="nav-content">
            <a class="nav-logo" href="{{ url_for('index') }}" aria-label="MLH Fellowship">
                <img src="{{ url_for('static', filename='img/logo-dark.svg') }}" alt="MLH" />
            </a>
            <nav class="nav-links">
                {% for page in pages %}
                <a href="{{ url_for(page.endpoint) }}"
                    class="nav-link {% if request.endpoint == page.endpoint %}active{% endif %}">{{ page.name }}</a>
                {% endfor %}
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>

</html>
